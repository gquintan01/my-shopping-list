<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  

  
  <title>My Shopping List</title>



  
  <style>
    :root {
      --bg: #eef3ff;
      --card: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --border: #dbe3ef;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f4f7ff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .top-actions {
      width: min(1100px, calc(100% - 24px));
      margin: 14px auto 0;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .container {
      width: min(1100px, calc(100% - 24px));
      margin: 14px auto 34px;
    }

    .hero {
      background: linear-gradient(135deg, #1e3a8a, #2563eb 60%, #60a5fa);
      color: white;
      padding: 22px 24px;
      border-radius: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.25fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.25rem;
    }

    .section-intro {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    input, select, button {
      font: inherit;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      color: var(--text);
    }

    input:focus, select:focus {
      outline: 2px solid rgba(37, 99, 235, 0.18);
      border-color: var(--primary);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 16px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 700;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-secondary {
      background: #e8eefc;
      color: #1e3a8a;
    }

    .btn-secondary:hover { background: #dbe7ff; }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .btn-danger:hover { background: #fecaca; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-box {
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px;
    }

    .stat-box span {
      display: block;
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-box strong { font-size: 1.25rem; }

    .toolbar {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .list-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 68vh;
      overflow: auto;
      padding-right: 2px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      background: white;
    }

    .item.done {
      background: #f0fdf4;
      border-color: #bbf7d0;
      opacity: 0.92;
    }

    .item-main { min-width: 0; }

    .item-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .item-title {
      font-size: 1rem;
      font-weight: 800;
      word-break: break-word;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-btn {
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .checkbox-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      justify-content: center;
      min-width: 140px;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.2;
    }

    .big-check {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 28px 12px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: #fafcff;
    }

    .helper {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
      margin: 0 0 12px;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .list-wrap { max-height: none; }
    }

    @media (max-width: 700px) {
      .top-actions,
      .container {
        width: min(100%, calc(100% - 14px));
      }

      .top-actions {
        margin: 10px auto 0;
      }

      .container {
        margin: 10px auto 20px;
      }

      .hero {
        padding: 16px 16px;
        border-radius: 18px;
        margin-bottom: 12px;
      }

      .card {
        padding: 14px;
        border-radius: 16px;
      }

      .form-grid,
      .toolbar,
      .stats {
        grid-template-columns: 1fr;
      }

      .button-row button {
        width: 100%;
      }

      .item {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 12px;
      }

      .checkbox-col {
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 14px;
        min-width: auto;
        flex-wrap: wrap;
      }

      .meta {
        flex-direction: column;
        gap: 4px;
      }

      .actions {
        justify-content: flex-start;
      }

      .action-btn {
        flex: 1;
        min-width: 104px;
        text-align: center;
      }

      input,
      select,
      button {
        font-size: 16px;
      }
    }
  </style>
</head>

  <div class="container">
    <section class="hero">

    <main class="grid">
      <section class="card left-panel">

        <p class="section-intro">Agrega, modifica o elimina artículos de forma rápida.</p>

        <form id="itemForm">

                <option value="Bebidas">Bebidas</option>
                <option value="Limpieza">Limpieza</option>
                <option value="Aseo personal">Aseo personal</option>
                <option value="Hogar">Hogar</option>

                <option value="Otros">Otros</option>
              </select>
            </div>

            <div class="form-group">
              <label for="unit">Unidad</label>
              <select id="unit" required>
                <option value="unidad">unidad</option>
                <option value="lb">lb</option>
                <option value="kg">kg</option>
                <option value="paquete">paquete</option>
                <option value="docena">docena</option>
                <option value="botella">botella</option>

                <option value="caja">caja</option>

            </div>

            <div class="form-group">
              <label for="quantity">Cantidad sugerida</label>
              <input id="quantity" type="number" min="1" step="1" value="1" required />
            </div>

            <div class="form-group">
              <label for="priority">Prioridad</label>
              <select id="priority">
                <option value="Normal">Normal</option>
                <option value="Alta">Alta</option>
                <option value="Baja">Baja</option>
              </select>
            </div>
          </div>

          <div class="button-row">
            <button type="submit" class="btn-primary" id="saveBtn">Guardar artículo</button>
            <button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none;">Cancelar edición</button>
            <button type="button" class="btn-secondary" id="seedBtn" style="display:none;">Cargar lista preliminar de Panamá</button>
          </div>
        </form>
      </section>

      <section class="card right-panel">
        <h2>Lista de artículos seleccionados</h2>

        <div class="stats">
          <div class="stat-box">
            <span>Total de artículos</span>
            <strong id="totalItems">0</strong>
          </div>
          <div class="stat-box">
            <span>Para próxima compra</span>
            <strong id="selectedItems">0</strong>
          </div>
          <div class="stat-box">
            <span>Cargados al carrito</span>
            <strong id="completedItems">0</strong>
          </div>
        </div>

        <div class="toolbar">
          <input id="searchInput" type="text" placeholder="Buscar artículo..." />
          <select id="filterCategory">
            <option value="">Todas las categorías</option>
            <option value="Despensa">Despensa</option>
            <option value="Lácteos y huevos">Lácteos y huevos</option>
            <option value="Carnes y embutidos">Carnes y embutidos</option>
            <option value="Frutas y vegetales">Frutas y vegetales</option>
            <option value="Bebidas">Bebidas</option>
            <option value="Limpieza">Limpieza</option>
            <option value="Aseo personal">Aseo personal</option>
            <option value="Hogar">Hogar</option>
            <option value="Mascotas">Mascotas</option>
            <option value="Otros">Otros</option>
          </select>
          <select id="viewMode">
            <option value="active">Ver lista actual</option>
            <option value="all">Ver todo</option>
            <option value="completed">Ver cargados al carrito</option>
          </select>
        </div>

        <div class="list-wrap" id="itemsContainer"></div>
      </section>
    </main>
  </div>

  <script type="module">

    const itemsRef = db ? ref(db, 'shoppingItems') : null;

    const form = document.getElementById('itemForm');
    const nameInput = document.getElementById('name');
    const categoryInput = document.getElementById('category');
    const unitInput = document.getElementById('unit');
    const quantityInput = document.getElementById('quantity');
    const priorityInput = document.getElementById('priority');
    const itemsContainer = document.getElementById('itemsContainer');
    const searchInput = document.getElementById('searchInput');
    const filterCategory = document.getElementById('filterCategory');
    const viewMode = document.getElementById('viewMode');
    const seedBtn = document.getElementById('seedBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const formTitle = document.getElementById('formTitle');
    const saveBtn = document.getElementById('saveBtn');

    const totalItemsEl = document.getElementById('totalItems');
    const selectedItemsEl = document.getElementById('selectedItems');
    const completedItemsEl = document.getElementById('completedItems');

    let items = [];
    let editingId = null;

    const preliminaryItems = [
      { name: 'Arroz', category: 'Despensa', unit: 'lb', quantity: 5, priority: 'Alta' },
      { name: 'Azúcar', category: 'Despensa', unit: 'lb', quantity: 2, priority: 'Normal' },
      { name: 'Sal', category: 'Despensa', unit: 'lb', quantity: 1, priority: 'Normal' },
      { name: 'Aceite vegetal', category: 'Despensa', unit: 'botella', quantity: 1, priority: 'Alta' },
      { name: 'Pasta', category: 'Despensa', unit: 'paquete', quantity: 2, priority: 'Normal' },
      { name: 'Salsa de tomate', category: 'Despensa', unit: 'unidad', quantity: 2, priority: 'Normal' },
      { name: 'Atún', category: 'Despensa', unit: 'unidad', quantity: 4, priority: 'Normal' },
      { name: 'Frijoles', category: 'Despensa', unit: 'unidad', quantity: 2, priority: 'Normal' },
      { name: 'Lentejas', category: 'Despensa', unit: 'unidad', quantity: 1, priority: 'Baja' },
      { name: 'Harina', category: 'Despensa', unit: 'lb', quantity: 1, priority: 'Baja' },
      { name: 'Café', category: 'Bebidas', unit: 'paquete', quantity: 1, priority: 'Alta' },
      { name: 'Leche', category: 'Lácteos y huevos', unit: 'unidad', quantity: 2, priority: 'Alta' },
      { name: 'Huevos', category: 'Lácteos y huevos', unit: 'docena', quantity: 1, priority: 'Alta' },
      { name: 'Queso amarillo', category: 'Lácteos y huevos', unit: 'paquete', quantity: 1, priority: 'Normal' },
      { name: 'Yogurt', category: 'Lácteos y huevos', unit: 'unidad', quantity: 4, priority: 'Baja' },
      { name: 'Pollo', category: 'Carnes y embutidos', unit: 'lb', quantity: 3, priority: 'Alta' },
      { name: 'Carne molida', category: 'Carnes y embutidos', unit: 'lb', quantity: 2, priority: 'Normal' },
      { name: 'Jamón', category: 'Carnes y embutidos', unit: 'paquete', quantity: 1, priority: 'Normal' },
      { name: 'Manzanas', category: 'Frutas y vegetales', unit: 'lb', quantity: 2, priority: 'Normal' },
      { name: 'Bananas', category: 'Frutas y vegetales', unit: 'lb', quantity: 2, priority: 'Normal' },
      { name: 'Tomates', category: 'Frutas y vegetales', unit: 'lb', quantity: 2, priority: 'Alta' },
      { name: 'Cebollas', category: 'Frutas y vegetales', unit: 'lb', quantity: 2, priority: 'Alta' },
      { name: 'Papas', category: 'Frutas y vegetales', unit: 'lb', quantity: 3, priority: 'Normal' },
      { name: 'Lechuga', category: 'Frutas y vegetales', unit: 'unidad', quantity: 1, priority: 'Baja' },
      { name: 'Detergente de ropa', category: 'Limpieza', unit: 'unidad', quantity: 1, priority: 'Alta' },
      { name: 'Lavaplatos', category: 'Limpieza', unit: 'unidad', quantity: 1, priority: 'Alta' },
      { name: 'Cloro', category: 'Limpieza', unit: 'botella', quantity: 1, priority: 'Normal' },
      { name: 'Desinfectante', category: 'Limpieza', unit: 'unidad', quantity: 1, priority: 'Normal' },
      { name: 'Papel higiénico', category: 'Hogar', unit: 'paquete', quantity: 1, priority: 'Alta' },
      { name: 'Servilletas', category: 'Hogar', unit: 'paquete', quantity: 1, priority: 'Normal' },
      { name: 'Jabón de baño', category: 'Aseo personal', unit: 'unidad', quantity: 4, priority: 'Normal' },
      { name: 'Pasta dental', category: 'Aseo personal', unit: 'unidad', quantity: 2, priority: 'Normal' },
      { name: 'Shampoo', category: 'Aseo personal', unit: 'unidad', quantity: 1, priority: 'Normal' },
      { name: 'Agua embotellada', category: 'Bebidas', unit: 'caja', quantity: 1, priority: 'Normal' }
    ];

    function resetForm() {
      form.reset();
      quantityInput.value = 1;
      unitInput.value = 'unidad';
      priorityInput.value = 'Normal';
      editingId = null;
      formTitle.textContent = 'Agregar artículo';
      saveBtn.textContent = 'Guardar artículo';
      cancelEditBtn.style.display = 'none';
    }

    function populateForm(item) {
      nameInput.value = item.name;
      categoryInput.value = item.category;
      unitInput.value = item.unit;
      quantityInput.value = item.quantity;
      priorityInput.value = item.priority || 'Normal';
      editingId = item.id;
      formTitle.textContent = 'Modificar artículo';
      saveBtn.textContent = 'Actualizar artículo';
      cancelEditBtn.style.display = 'inline-flex';
      window.scrollTo({ top: document.querySelector('.left-panel').offsetTop - 10, behavior: 'smooth' });
    }

    function renderItems() {
      const search = searchInput.value.trim().toLowerCase();
      const categoryFilter = filterCategory.value;
      const mode = viewMode.value;

      const filtered = items
        .filter(item => {
          const matchesSearch = item.name.toLowerCase().includes(search);
          const matchesCategory = !categoryFilter || item.category === categoryFilter;
          const matchesMode =
            mode === 'all' ? true :
            mode === 'completed' ? item.inCart :
            item.selectedForNextBuy && !item.inCart;

          return matchesSearch && matchesCategory && matchesMode;
        })
        .sort((a, b) => {
          if (a.inCart !== b.inCart) return a.inCart ? 1 : -1;
          return a.name.localeCompare(b.name, 'es');
        });

      totalItemsEl.textContent = items.length;
      selectedItemsEl.textContent = items.filter(item => item.selectedForNextBuy && !item.inCart).length;
      completedItemsEl.textContent = items.filter(item => item.inCart).length;

      if (!filtered.length) {
        itemsContainer.innerHTML = '<div class="empty">No hay artículos para mostrar con los filtros actuales.</div>';
        return;
      }

      itemsContainer.innerHTML = filtered.map(item => `
        <article class="item ${item.inCart ? 'done' : ''}">
          <div class="checkbox-col">
            <label class="check-label">
              <input class="big-check select-next" type="checkbox" data-id="${item.id}" ${item.selectedForNextBuy ? 'checked' : ''} ${item.inCart ? 'disabled' : ''} />
              <span>Próxima compra</span>
            </label>
            <label class="check-label">
              <input class="big-check mark-cart" type="checkbox" data-id="${item.id}" ${item.inCart ? 'checked' : ''} ${!item.selectedForNextBuy && !item.inCart ? 'disabled' : ''} />
              <span>Ya en carrito</span>
            </label>
          </div>

          <div>
            <div class="item-top">
              <strong class="item-title">${item.name}</strong>
              <span class="badge">${item.category}</span>
              <span class="badge">${item.priority || 'Normal'}</span>
            </div>
            <div class="meta">
              <span>Cantidad sugerida: <strong>${item.quantity}</strong> ${item.unit}</span>
              <span>Estado: <strong>${item.inCart ? 'Cargado al carrito' : item.selectedForNextBuy ? 'Pendiente de compra' : 'En catálogo'}</strong></span>
            </div>
          </div>

          <div class="actions">
            <button class="action-btn btn-secondary edit-btn" data-id="${item.id}">Editar</button>
            <button class="action-btn btn-danger delete-btn" data-id="${item.id}">Borrar</button>
          </div>
        </article>
      `).join('');

      bindDynamicEvents();
    }

    function bindDynamicEvents() {
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = items.find(x => x.id === btn.dataset.id);
          if (item) populateForm(item);
        });
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const item = items.find(x => x.id === btn.dataset.id);
          if (!item) return;
          const confirmed = confirm(`¿Deseas borrar "${item.name}"?`);
          if (!confirmed || !itemsRef) return;
          await remove(ref(db, `shoppingItems/${item.id}`));
        });
      });

      document.querySelectorAll('.select-next').forEach(check => {
        check.addEventListener('change', async () => {
          if (!itemsRef) return;
          const id = check.dataset.id;
          await update(ref(db, `shoppingItems/${id}`), {
            selectedForNextBuy: check.checked,
            inCart: false
          });
        });
      });

      document.querySelectorAll('.mark-cart').forEach(check => {
        check.addEventListener('change', async () => {
          if (!itemsRef) return;
          const id = check.dataset.id;
          await update(ref(db, `shoppingItems/${id}`), {
            inCart: check.checked,
            selectedForNextBuy: check.checked ? false : true
          });
        });
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!itemsRef) {
        alert('Debes configurar Firebase antes de guardar artículos.');
        return;
      }

      const payload = {
        name: nameInput.value.trim(),
        category: categoryInput.value,
        unit: unitInput.value,
        quantity: Number(quantityInput.value),
        priority: priorityInput.value,
        selectedForNextBuy: false,
        inCart: false,
        updatedAt: new Date().toISOString()
      };

      if (!payload.name || !payload.category) return;

      if (editingId) {
        const current = items.find(item => item.id === editingId);
        await update(ref(db, `shoppingItems/${editingId}`), {
          ...payload,
          selectedForNextBuy: current?.selectedForNextBuy ?? false,
          inCart: current?.inCart ?? false
        });
      } else {
        await push(itemsRef, {
          ...payload,
          createdAt: new Date().toISOString()
        });
      }

      resetForm();
    });

    cancelEditBtn.addEventListener('click', resetForm);

    [searchInput, filterCategory, viewMode].forEach(el => {
      el.addEventListener('input', renderItems);
      el.addEventListener('change', renderItems);
    });

    seedBtn.addEventListener('click', async () => {
      if (!itemsRef) {
        alert('Debes configurar Firebase antes de cargar la lista preliminar.');
        return;
      }

      const snapshot = await get(child(ref(db), 'shoppingItems'));
      if (snapshot.exists()) {
        const confirmed = confirm('Ya existen artículos guardados. ¿Deseas agregar la lista preliminar de todos modos?');
        if (!confirmed) return;
      }

      for (const item of preliminaryItems) {
        await push(itemsRef, {
          ...item,
          selectedForNextBuy: false,
          inCart: false,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
      }
    });

    if (itemsRef) {
      onValue(itemsRef, (snapshot) => {
        const data = snapshot.val() || {};
        items = Object.entries(data).map(([id, value]) => ({ id, ...value }));
        renderItems();
      });
    } else {
      itemsContainer.innerHTML = '<div class="empty">Configura Firebase para comenzar a usar la aplicación.</div>';
    }

    resetForm();
  </script>
</body>
</html>
